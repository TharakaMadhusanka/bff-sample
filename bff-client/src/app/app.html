      <div class="font-bold size-lg text-center">
        Hello Backend for Frontend
      </div>
      <div class="flex flex-row p-10">
        <div class="flex flex-col gap-2" *ngIf="authService.user$ | async as user; else loading">
          <h1>Welcome back, {{ user?.name }}!</h1>
          <p>Email: {{ user?.email }}</p>
          <p>Assigned Roles</p>
          <ol>
            @for(role of user?.roles; track $index){
              <li>{{role}}</li>
            } 
          </ol>
        </div>
    
    <ng-template #loading>
      <p>Verifying session status, redirecting if needed...</p>
    </ng-template>


<router-outlet />
